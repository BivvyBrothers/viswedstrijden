<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #353d2a;
    position: relative;
    color: #fff;
  }
  /* zachte organische vlekken zoals de app-achtergrond */
  .vlek { position: absolute; border-radius: 50%; background: #4d5839; opacity: .45; }
  .v1 { width: 520px; height: 420px; left: -140px; top: -160px; }
  .v2 { width: 640px; height: 520px; right: -200px; bottom: -240px; }
  .v3 { width: 300px; height: 240px; right: 160px; top: -110px; opacity: .3; }
  .inhoud {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 64px;
    padding: 0 80px;
  }
  .logo {
    width: 300px; height: 300px; border-radius: 56px;
    box-shadow: 0 18px 60px rgba(0,0,0,.35);
    flex: 0 0 auto;
  }
  .tekst { max-width: 660px; }
  .slogan {
    font-size: 92px; font-weight: 800; letter-spacing: -1px;
    line-height: 1.04; margin-bottom: 26px;
  }
  .slogan .accent { color: #f0a04b; }
  .sub {
    font-size: 34px; font-weight: 500; color: #d9dcc2;
    line-height: 1.3; margin-bottom: 34px;
  }
  .url {
    display: inline-block;
    font-size: 30px; font-weight: 700; color: #353d2a;
    background: #f0a04b; border-radius: 16px;
    padding: 12px 28px;
  }
</style>
</head>
<body>
  <div class="vlek v1"></div>
  <div class="vlek v2"></div>
  <div class="vlek v3"></div>
  <div class="inhoud">
    <img class="logo" src="../docs/icon-512.png" alt="">
    <div class="tekst">
      <div class="slogan">Loot. Vis. <span class="accent">Win.</span></div>
      <div class="sub">De wedstrijd-app voor verenigingen en vriendengroepen. Loting, stekkeuze, vangsten en live klassement.</div>
      <div class="url">viswedstrijdapp.nl</div>
    </div>
  </div>
</body>
</html>
